<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Tracker</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 1rem; }
    .container { max-width: 680px; margin: 0 auto; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .top-bar h2 { margin: 0; }
    .logout-btn { padding: 0.4rem 1rem; background: #f3f4f6; border: 1px solid #ccc; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .logout-btn:hover { background: #e5e7eb; }
    .card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .totals { display: flex; gap: 1rem; justify-content: space-between; }
    .total-box { flex: 1; text-align: center; padding: 0.8rem; border-radius: 8px; }
    .total-box.income { background: #dcfce7; color: #16a34a; }
    .total-box.expense { background: #fee2e2; color: #dc2626; }
    .total-box.balance { background: #e0e7ff; color: #4f46e5; }
    .total-box h4 { margin: 0 0 0.3rem; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
    .total-box p { margin: 0; font-size: 20px; font-weight: bold; }
    .label { font-size: 12px; color: #6b7280; margin-bottom: 0.3rem; }
    .form-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
    .form-row input, .form-row select { flex: 1; padding: 0.6rem; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; min-width: 100px; }
    .type-toggle { display: flex; border-radius: 8px; overflow: hidden; border: 1px solid #ccc; width: 100%; margin-bottom: 0.8rem; }
    .type-toggle button { flex: 1; padding: 0.6rem; border: none; cursor: pointer; font-size: 14px; font-weight: 500; background: #f9fafb; transition: all 0.2s; }
    .type-toggle button.active-income { background: #16a34a; color: white; }
    .type-toggle button.active-expense { background: #dc2626; color: white; }
    .add-btn { width: 100%; padding: 0.7rem; background: #4f46e5; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: 500; margin-top: 0.5rem; }
    .add-btn:hover { background: #4338ca; }
    .filter-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .filter-btn { padding: 0.4rem 1rem; border: 1px solid #ccc; border-radius: 20px; cursor: pointer; font-size: 13px; background: white; }
    .filter-btn:hover { background: #f3f4f6; }
    .filter-btn.active { background: #4f46e5; color: white; border-color: #4f46e5; }
    .filter-btn.income-btn.active { background: #16a34a; border-color: #16a34a; }
    .filter-btn.expense-btn.active { background: #dc2626; border-color: #dc2626; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 0.5rem; border-bottom: 2px solid #e5e7eb; font-size: 13px; color: #6b7280; text-transform: uppercase; }
    td { padding: 0.6rem 0.5rem; border-bottom: 1px solid #f3f4f6; font-size: 14px; }
    .amount.positive { color: #16a34a; font-weight: bold; }
    .amount.negative { color: #dc2626; font-weight: bold; }
    .delete-btn { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 16px; }
    .delete-btn:hover { color: #b91c1c; }
    .empty { text-align: center; color: #9ca3af; padding: 2rem; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">

    <!-- Top bar -->
    <div class="top-bar">
      <h2>💰 Finance Tracker / 記帳本</h2>
      <button class="logout-btn" onclick="logout()">Logout / 登出</button>
    </div>

    <!-- Totals -->
    <div class="card">
      <div class="totals">
        <div class="total-box income">
          <h4>Total Income / 總收入</h4>
          <p id="total-income">$0</p>
        </div>
        <div class="total-box expense">
          <h4>Total Expense / 總支出</h4>
          <p id="total-expense">$0</p>
        </div>
        <div class="total-box balance">
          <h4>Balance / 結餘</h4>
          <p id="total-balance">$0</p>
        </div>
      </div>
    </div>

    <!-- Add record form -->
    <div class="card">
      <p style="margin:0 0 0.8rem; font-weight:500">Add Record / 新增記錄</p>

      <!-- Income / Expense toggle -->
      <div class="type-toggle">
        <button id="btn-income" class="active-income" onclick="setType('income')">
          ＋ Income / 收入
        </button>
        <button id="btn-expense" onclick="setType('expense')">
          － Expense / 支出
        </button>
      </div>

      <div class="form-row">
        <div style="flex:2; min-width:120px">
          <div class="label">Description / 說明</div>
          <input type="text" id="description" placeholder="e.g. Lunch / 午餐" />
        </div>
        <div style="flex:1; min-width:100px">
          <div class="label">Amount / 金額</div>
          <input type="number" id="amount" placeholder="e.g. 150" min="0" />
        </div>
      </div>

      <div class="form-row">
        <div style="flex:1">
          <div class="label">Category / 分類</div>
          <select id="category">
            <option value="餐飲">🍜 Food / 餐飲</option>
            <option value="交通">🚌 Transport / 交通</option>
            <option value="娛樂">🎮 Entertainment / 娛樂</option>
            <option value="收入">💵 Income / 收入</option>
            <option value="其他">📦 Other / 其他</option>
          </select>
        </div>
      </div>

      <button class="add-btn" onclick="addRecord()">+ Add Record / 新增記錄</button>
    </div>

    <!-- Filter buttons -->
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all', this)">All / 全部</button>
      <button class="filter-btn income-btn" onclick="setFilter('income', this)">Income / 收入</button>
      <button class="filter-btn expense-btn" onclick="setFilter('expense', this)">Expense / 支出</button>
    </div>

    <!-- Records table -->
    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Description / 說明</th>
            <th>Category / 分類</th>
            <th>Amount / 金額</th>
            <th>Date / 日期</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="records-body"></tbody>
      </table>
      <div id="empty-msg" class="empty" style="display:none">
        No records yet / 還沒有記錄
      </div>
    </div>

  </div>

  <script>
    let allRecords = []
    let currentFilter = 'all'
    let currentType = 'income'

    function setType(type) {
      currentType = type
      const btnIncome  = document.getElementById('btn-income')
      const btnExpense = document.getElementById('btn-expense')
      btnIncome.className  = type === 'income'  ? 'active-income'  : ''
      btnExpense.className = type === 'expense' ? 'active-expense' : ''
    }

    async function loadRecords() {
      const res = await fetch('/api/accounts', { credentials: 'include' })
      if (res.status === 401) {
        window.location.href = '/login.html'
        return
      }
      allRecords = await res.json()
      renderRecords()
      updateTotals()
    }

    function setFilter(filter, btn) {
      currentFilter = filter
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
      btn.classList.add('active')
      renderRecords()
    }

    function getFilteredRecords() {
      if (currentFilter === 'income')  return allRecords.filter(r => r.amount > 0)
      if (currentFilter === 'expense') return allRecords.filter(r => r.amount < 0)
      return allRecords
    }

    function renderRecords() {
      const tbody    = document.getElementById('records-body')
      const emptyMsg = document.getElementById('empty-msg')
      const filtered = getFilteredRecords()
      tbody.innerHTML = ''

      if (filtered.length === 0) {
        emptyMsg.style.display = 'block'
        return
      }

      emptyMsg.style.display = 'none'
      filtered.forEach(record => {
        const tr = document.createElement('tr')
        const date = new Date(record.createdAt).toLocaleDateString('zh-TW')
        const isPositive = record.amount > 0
        tr.innerHTML = `
          <td>${record.description}</td>
          <td>${record.category}</td>
          <td class="amount ${isPositive ? 'positive' : 'negative'}">
            ${isPositive ? '+' : ''}${record.amount}
          </td>
          <td>${date}</td>
          <td><button class="delete-btn" onclick="deleteRecord('${record._id}')">🗑️</button></td>
        `
        tbody.appendChild(tr)
      })
    }

    function updateTotals() {
      const income  = allRecords.filter(r => r.amount > 0).reduce((s, r) => s + r.amount, 0)
      const expense = allRecords.filter(r => r.amount < 0).reduce((s, r) => s + r.amount, 0)
      const balance = income + expense
      document.getElementById('total-income').textContent  = `$${income}`
      document.getElementById('total-expense').textContent = `$${expense}`
      document.getElementById('total-balance').textContent = `$${balance}`
    }

    async function addRecord() {
      const description = document.getElementById('description').value
      const rawAmount   = parseFloat(document.getElementById('amount').value)
      const category    = document.getElementById('category').value

      if (!description || isNaN(rawAmount) || rawAmount <= 0) {
        alert('Please fill in description and a positive amount! / 請填寫說明和正確金額！')
        return
      }

      // Make negative if expense
      const amount = currentType === 'expense' ? -rawAmount : rawAmount

      const res = await fetch('/api/accounts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ description, amount, category })
      })

      if (res.status === 401) {
        window.location.href = '/login.html'
        return
      }

      const newRecord = await res.json()
      allRecords.unshift(newRecord)
      renderRecords()
      updateTotals()

      document.getElementById('description').value = ''
      document.getElementById('amount').value = ''
    }

    async function deleteRecord(id) {
      if (!confirm('Delete this record? / 確定要刪除嗎？')) return

      const res = await fetch(`/api/accounts/${id}`, {
        method: 'DELETE',
        credentials: 'include'
      })

      if (res.status === 401) {
        window.location.href = '/login.html'
        return
      }

      if (res.ok) {
        allRecords = allRecords.filter(r => r._id !== id)
        renderRecords()
        updateTotals()
      }
    }

    async function logout() {
      await fetch('/api/auth/logout', {
        method: 'POST',
        credentials: 'include'
      })
      window.location.href = '/login.html'
    }

    loadRecords()
  </script>
</body>
</html>
