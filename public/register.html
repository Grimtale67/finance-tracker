<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>註冊</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f2f5; }
    .box { background: white; padding: 2rem; border-radius: 12px; width: 320px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    h2 { margin-bottom: 1.5rem; text-align: center; }
    input, select { width: 100%; padding: 0.6rem; margin-bottom: 1rem; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
    button { width: 100%; padding: 0.7rem; background: #4f46e5; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 15px; }
    button:hover { background: #4338ca; }
    p { text-align: center; margin-top: 1rem; font-size: 14px; }
    #error { color: red; font-size: 13px; margin-bottom: 0.5rem; display: none; }
  </style>
</head>
<body>
  <div class="box">
    <h2>註冊帳號</h2>
    <div id="error"></div>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="密碼（至少6個字元）" />
    <button onclick="register()">註冊</button>
    <p>已有帳號？<a href="/login.html">登入</a></p>
  </div>

  <script>
    async function register() {
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      const errorDiv = document.getElementById('error')

      // Bonus: frontend password length check
      if (password.length < 6) {
        errorDiv.style.display = 'block'
        errorDiv.textContent = '密碼至少需要 6 個字元！'
        return
      }

      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      })

      const data = await res.json()

      if (res.ok) {
        alert('註冊成功！請登入')
        window.location.href = '/login.html'
      } else {
        errorDiv.style.display = 'block'
        errorDiv.textContent = data.message
      }
    }
  </script>
</body>
</html>
